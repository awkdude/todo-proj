<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$TITLE$ | Log in</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" id="theme" />
        <script defer type="module" src="/js/script.js"></script>
        <script defer type="module" src="/js/history.js"></script>
    </head>
    <body>
        <h1>$TITLE$</h1>
        <section>
            <div id="view-switch">
                View:
                <a href="/home">Daily</a>
                <a href="/history">Monthly</a>
            </div>
            <label for="month-select">Select Month: </label><br>
            <input type="month" id="month-select" />
            <header>
                <h2 id="month-name">January</h2>
            </header>
            <div id="progress-stats">
                <label id="progress-label" for="progress"></label>
                <br />
                <meter
                    id="progress"
                    min="0"
                    max="100"
                    low="33"
                    high="66"
                    optimum="80"
                    value="50"
                ></meter>
            </div>
            <table id="calendar">
                <thead>
                    <tr>
                        <th>Sun</th>
                        <th>Mon</th>
                        <th>Tue</th>
                        <th>Wed</th>
                        <th>Thu</th>
                        <th>Fri</th>
                        <th>Sat</th>
                    </tr>
                </thead>
                <tbody id="calendar-body"></tbody>
            </table>
        </section>
        <p id="dd"></p>
            <div id="pie-progress">
            <canvas id="c" width=400 height=400></canvas>
            <fieldset id="category-list">
                <legend>Legend</legend>
            </fieldset>
        </div>
    </body>
</html>
