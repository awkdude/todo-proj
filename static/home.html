<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$TITLE$ | $USERNAME$</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" id="theme" />
        <script defer type="module" src="js/script.js"></script>
        <script defer type="module" src="js/home.js"></script>
    </head>
    <body>
        <p id="size"></p>
        <header>
            <h1 id="welcome"></h1>
            <h2 id="datetime"></h2>
        </header>
        <section>
            <header>
                <button id="addtask" popovertarget="create-task-dialog">
                    + Add task
                </button>
                <button id="view-history-button">
                    <svg id="history-icon" width="20" height="20">
                        <circle class="face" cx="10" cy="10" r="5"></circle>
                    </svg>
                    History
                </button>
                <button id="settings-button">Settings</button>
                <div>
                    View:
                    <input
                        type="radio"
                        id="daily-view"
                        name="view-type"
                        value="daily"
                    />
                    <label for="daily-view">Daily</label>
                    <input
                        type="radio"
                        id="weekly-view"
                        name="view-type"
                        value="weekly"
                    />
                    <label for="weekly-view">Weekly</label>
                    <input
                        type="radio"
                        id="monthly-view"
                        name="view-type"
                        value="monthly"
                    />
                    <label for="monthly-view">Monthly</label>
                </div>
            </header>
            <dialog id="create-task-dialog" popover>
                <form method="dialog">
                    <h2>Create Task</h2>
                    <p>
                        <label>Name: </label
                        ><input
                            type="text"
                            id="create-task-title"
                            name="create-task-title"
                            placeholder=""
                            required
                            autofocus
                        />
                    </p>
                    <p>
                        <label>Date &amp; Time: </label
                        ><input
                            type="datetime-local"
                            id="create-task-datetime"
                            name="create-task-datetime"
                            required
                        />
                    </p>
                </form>
                <button
                    id="submit-creation"
                    class="positive"
                    popovertarget="create-task-dialog"
                    popovertargetaction="hide"
                >
                    Add
                </button>
                <button
                    id="cancel-creation"
                    class="negative"
                    popovertarget="create-task-dialog"
                    popovertargetaction="hide"
                >
                    Cancel
                </button>
            </dialog>
            <div id="task-view">
                <canvas id="grid"></canvas>
            </div>
        </section>
    </body>
</html>
