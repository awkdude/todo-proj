<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$TITLE$ | $USERNAME$</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" id="theme" />
        <script defer type="module" src="js/script.js"></script>
        <script defer type="module" src="js/home.js"></script>
    </head>
    <body>
        <a id="logout" href="/">Log out</a>
        <a id="rec-link" href="/rec">Manage recurring tasks</a>
        <p id="size"></p>
        <header>
            <h1 id="welcome"></h1>
            <h2 id="datetime">
                <span id="datetime-intro"></span><span id="date"></span>
                <span id="time"></span>
            </h2>
        </header>
        <section>
            <header>
                <button id="addtask" popovertarget="create-task-dialog">
                    + Add task
                </button>
                <button id="settings-button" popovertarget="settings">
                    Settings
                </button>
                <div id="view-switch">
                    View:
                    <a href="/home">Daily</a>
                    <a href="/history">Monthly</a>
                </div>
                <div id="demo-input">
                    <label for="demo-time">For Demo Only: </label
                    ><input type="datetime-local" id="demo-time" />
                </div>
            </header>
            <dialog id="create-task-dialog" popover>
                <form method="dialog">
                    <h2>Create Task</h2>
                    <p>
                        <label>Title: </label
                        ><input
                            type="text"
                            id="create-task-title"
                            name="title"
                            placeholder="Do homework"
                            required
                            autofocus
                        />
                    </p>
                    <p>
                        <label for="create-task-is-range">Is Range?</label>
                        <input
                            type="checkbox"
                            id="create-task-is-range"
                            name="is_range"
                        />
                    </p>
                    <p id="show-if-range" hidden>
                        <label for="create-task-range-max">Max value: </label>
                        <input
                            type="number"
                            value="2"
                            min="2"
                            id="create-task-range-max"
                            name="range_max"
                        />units
                    </p>
                    <p>
                        <label>Frequency</label>
                        <select id="frequency-select">
                            <option value="none-opt" selected>None</option>
                            <option value="daily-opt">Everyday</option>
                            <option value="weekly-opt">Weekly</option>
                        </select>
                    </p>
                    <div id="show-if-weekly" hidden>
                        <p>
                            <input type="checkbox" id="day-sun" />
                            <label for="day-sun">Sunday</label>
                        </p>
                        <p>
                            <input type="checkbox" id="day-mon" />
                            <label for="day-mon">Monday</label>
                        </p>
                        <p>
                            <input type="checkbox" id="day-tue" />
                            <label for="day-tue">Tuesday</label>
                        </p>
                        <p>
                            <input type="checkbox" id="day-wed" />
                            <label for="day-wed">Wednesday</label>
                        </p>
                        <p>
                            <input type="checkbox" id="day-thu" />
                            <label for="day-thu">Thursday</label>
                        </p>
                        <p>
                            <input type="checkbox" id="day-fri" />
                            <label for="day-fri">Friday</label>
                        </p>
                        <p>
                            <input type="checkbox" id="day-sat" />
                            <label for="day-sat">Saturday</label>
                        </p>
                    </div>
                    <p>
                        <!-- TODO:  -->
                    </p>
                    <p>
                        <label>Date: </label
                        ><input type="date" id="create-task-date" name="date" />
                        <button id="clear-date"></button>
                    </p>
                    <p>
                        <label>Time: </label
                        ><input type="time" id="create-task-time" name="time" />
                        <button id="clear-time"></button>
                    </p>
                    <p>
                        <label>End Date: </label
                        ><input
                            type="date"
                            id="create-task-end-date"
                            name="end-date"
                            disabled
                        />
                        <button id="clear-end-date"></button>
                    </p>
                    <div>
                        <textarea
                            id="description"
                            rows="4"
                            cols="50"
                            placeholder="Task description here..."
                        >
                        </textarea>
                    </div>
                </form>
                <button
                    id="submit-creation"
                    class="positive"
                    popovertarget="create-task-dialog"
                    popovertargetaction="hide"
                >
                    Add
                </button>
                <button
                    id="cancel-creation"
                    class="negative"
                    popovertarget="create-task-dialog"
                    popovertargetaction="hide"
                >
                    Cancel
                </button>
            </dialog>
            <!-- <dialog id="settings" popover> -->
            <!--     <form method="dialog"> -->
            <!--         <h2>Settings</h2> -->
            <!--         <p> -->
            <!--             <label>Theme: </label> -->
            <!--             <select id="theme-select"> -->
            <!--                 <option value="light-opt" selected>Light</option> -->
            <!--                 <option value="daily-opt">Dark</option> -->
            <!--             </select> -->
            <!--         </p> -->
            <!-- </dialog> -->
            <main id="task-view">
                <div id="progress-stats">
                    <label id="progress-label" for="progress"></label>
                    <br />
                    <meter
                        id="progress"
                        min="0"
                        max="100"
                        low="33"
                        high="66"
                        optimum="80"
                        value="50"
                    ></meter>
                </div>
                <div id="task-elements">
                    <!-- style="overflow: scroll; height: 6in;" -->
                </div>
            </main>
        </section>
    </body>
</html>
