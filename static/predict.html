<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$TITLE$ | $USERNAME$</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" id="theme" />
    </head>
    <body>
        <h1>Prediction test</h1>
        <input type="text" id="title"/>
        <button>Submit</button>
        <br>
        <h2 id="prediction"></h2>
    </body>
    <script>
        const title_input = document.querySelector('#title');
        const prediction_output = document.querySelector('#prediction');
        const submit_button = document.querySelector('button');
        submit_button.addEventListener('click', (event) => {
        const json_data = {
title: title_input.value
        };
        console.log(JSON.stringify(json_data));
            fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(json_data)
            }).then(response => response.json()).then((data) => {
                console.log(`Output: ${JSON.stringify(json_data)}`);
                prediction_output.textContent = data.category_name
            }).catch(err => {
                prediction_output.textContent = 'ERROR!';
            });
        });
    </script>
</html>
