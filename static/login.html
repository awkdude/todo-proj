<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <title>$TITLE$ | Log in</title>
        <link rel="icon" type="image/x-icon" href="assets/icon.ico" />
        <link rel="stylesheet" href="css/style.css" id="theme" />
    </head>
    <body>
        <h1>$TITLE$</h1>
        <h2>Create an Account</h2>
        <script defer src="js/script.js"></script>
        <form id="login" name="login" method="POST" action="/">
            <fieldset>
                <legend>Login</legend>
                <div>
                    <label for="username">Username/Email</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="John"
                        required
                    />
                </div>
                <div>
                    <label for="the_password">Password</label>
                    <input type="password" id="the_password" name="password" />
                    <p id="password_comment"></p>
                </div>
            </fieldset>
            <div id="buttons">
                <input type="submit" value="Log in" title="Submit to create an account" />
            </div>
        </form>
        <h2>Don't have an account? <a href="/?mode=register">Sign up</a></h2>
        <script type="module">
            document
                .querySelector('form#login')
                ?.addEventListener('submit', function (event) {
                    // TODO:
                    // alert('Submittion attempted');
                    // event.preventDefault();
                });
        </script>
    </body>
</html>
