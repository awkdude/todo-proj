<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <title>$TITLE$ - Create Account</title>
        <link rel="icon" type="image/x-icon" href="resources/icon.ico" />
        <link rel="linksheet" href="link.css" id="theme" />
    </head>
    <body>
        <h1>$TITLE$</h1>
        <h2>Create an Account</h2>
        <script defer src="./script.js"></script>
        <script type="text/javascript">
            'use strict';
            document.addEventListener('DOMContentLoaded', (event) => {
                document
                    .querySelector('form')
                    ?.addEventListener('submit', function (event) {
                        alert('Submittion attempted');
                        event.preventDefault();
                    });
            });
        </script>
        <form id="login" name="login" method="post" action="/">
            <fieldset>
                <legend>Login</legend>
                <div>
                    <label for="username">Username/Email</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="John"
                        required
                    />
                </div>
                <div>
                    <label for="the_password">Password</label>
                    <input type="password" id="the_password" name="the_password" />
                    <p id="password_comment"></p>
                </div>
            </fieldset>
            <div id="buttons">
                <input type="submit" value="Log in" title="Submit to create an account" />
            </div>
        </form>
        <h2>Don't have an account? <a href="/?mode=register">Sign up</a></h2>
    </body>
</html>
