<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$TITLE$ | Log in</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" id="theme" />
        <script defer type="module" src="js/script.js"></script>
        <script defer type="module" src="js/login.js"></script>
    </head>
    <body>
        <h1 id="app-title">$TITLE$</h1>
        <h2>Create an Account</h2>
        <div id="login-error" class="error" hidden>
            Incorrect username or password. Please try again.
        </div>
        <form id="login" name="login" method="POST" action="/api/sessions">
            <fieldset>
                <legend>Login</legend>
                <div>
                    <label for="username">Username/Email</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="John"
                        required
                    />
                </div>
                <div>
                    <label for="the_password">Password</label>
                    <input type="password" id="the_password" name="password" />
                    <p id="password_comment"></p>
                </div>
            </fieldset>
            <div id="buttons">
                <input
                    type="submit"
                    value="Log in"
                    title="Submit to create an account"
                />
            </div>
        </form>
        <h2>Don't have an account? <a href="/register">Sign up</a></h2>
    </body>
</html>
