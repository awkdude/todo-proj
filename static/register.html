<!doctype html>
<html>
    <head lang="en">
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>$TITLE$ | Create Account</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" id="theme" />
        <script defer type="module" src="js/script.js"></script>
        <script defer type="module" src="js/register.js"></script>
    </head>
    <body>
        <h1>$TITLE$</h1>
        <h2>Create an Account</h2>
        <form
            id="create-acc-form"
            name="acc-form"
            method="POST"
            action="/api/users"
        >
            <fieldset>
                <legend>Create Account</legend>
                <div id="login-error" class="error" hidden></div>
                <div>
                    <label for="fullname">Name</label>
                    <input
                        type="text"
                        id="fullname"
                        name="fullname"
                        placeholder="John Doe"
                        required
                    />
                </div>
                <div>
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="johndoe123"
                        required
                    />
                    <p class="input-comment" id="username-comment"></p>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" />
                    <p class="input-comment" id="password-comment"></p>
                </div>
                <div>
                    <label for="confirm-password">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm-password"
                        name="confirm_password"
                    />
                    <p class="input-comment" id="confirm-password-comment"></p>
                </div>
            </fieldset>
            <div id="buttons">
                <input
                    type="submit"
                    value="Submit"
                    title="Submit to create an account"
                />
            </div>
        </form>
        <p id="stuff"></p>
        <h2>Already have an account? <a href="/login">Log in </a></h2>
    </body>
</html>
